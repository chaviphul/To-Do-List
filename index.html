<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="todolist.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/e0f759f120.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="mainbox">

        <header>
            <div class="text">
                <h3><i class="fa-solid fa-clipboard-list"></i>My Tasks</h3>
                <p>Stay organized and get things done!</p>
            </div>
            <div class="taskinput">
                <input type="text" id="nexttask" placeholder="What do you want to do?">
                <button type="button" id="addtask">Add Task +</button>
            </div>
        </header>

        <main id="main">
            <div class="task">
                <input type="checkbox">
                <p>Study JavaScript</p>
                <button type="button" class="delete-btn"><i class="fa-solid fa-trash-can"></i></button>
            </div>

            <div class="task">
                <input type="checkbox">
                <p>Make Projects</p>
                <button type="button" class="delete-btn"><i class="fa-solid fa-trash-can" ></i></button>
            </div>
        </main>

        <footer>
            <p>Total tasks: <span id="total">2</span></p>
            <p>Completed: <span id="Completed">0</span> </p>
            <p>Pending: <span id="Completed">2</span></p>
        </footer>

    </div>
    <script src="todolist.js"></script>
</body>

</html>
